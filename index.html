  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; height:100%;}
  body{
    font-family:var(--font); color:var(--ink); background:#EDE7F0;
    display:flex; justify-content:center; -webkit-font-smoothing:antialiased;
  }
  #app{width:100%; max-width:460px; min-height:100vh; display:flex; flex-direction:column;
    position:relative; padding-bottom:80px; background-size:cover; background-position:center;
    background:linear-gradient(180deg,#FBF7F0 0%,#EDE7F0 55%,#F5E3E4 100%);}

  /* header */
  .hdr{display:flex; align-items:center; justify-content:space-between; padding:18px 18px 10px; gap:8px;}
  .hdr .side{width:88px; display:flex; gap:6px;}
  .icon-btn{width:38px; height:38px; border-radius:50%; border:none; background:rgba(255,255,255,.6);
    display:flex; align-items:center; justify-content:center; font-size:19px; color:var(--ink);
    cursor:pointer; backdrop-filter:blur(6px); transition:background .15s;}
  .icon-btn:active{background:rgba(255,255,255,.95);}
  .year-pick{display:flex; align-items:center; gap:10px; font-size:20px; font-weight:600; letter-spacing:.5px;}
  .year-pick button{border:none; background:none; font-size:18px; color:var(--muted); cursor:pointer;
    padding:6px; line-height:1; border-radius:8px;}
  .year-pick button:active{color:var(--ink);}

  /* month strip */
  .mstrip{display:flex; gap:6px; overflow-x:auto; padding:6px 16px 12px; scrollbar-width:none;}
  .mstrip::-webkit-scrollbar{display:none;}
  .mstrip .m{flex:0 0 auto; padding:7px 14px; border-radius:20px; font-size:14px; font-weight:500;
    color:var(--muted); background:transparent; border:none; cursor:pointer; white-space:nowrap; transition:all .15s;}
  .mstrip .m.active{color:#fff; background:var(--ink); font-weight:600;}
  .mstrip .m.has::after{content:''; display:inline-block; width:4px; height:4px; border-radius:50%;
    background:var(--coral); margin-left:5px; vertical-align:middle;}
  .mstrip .m.active.has::after{background:#fff;}

  /* calendar */
  .cal-title{padding:8px 22px 4px; font-size:15px; font-weight:600; color:var(--ink);}
  .weekhdr{display:grid; grid-template-columns:repeat(7,1fr); padding:6px 14px 2px; gap:4px;}
  .weekhdr span{text-align:center; font-size:11px; font-weight:600; letter-spacing:.5px; color:var(--muted);}
  .weekhdr span.sun{color:#D98C86;}
  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; padding:6px 14px 20px;}
  .cell{aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;}
  .day{width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:14px; color:var(--muted); cursor:pointer; background:rgba(255,255,255,.45);
    border:1.5px solid transparent; position:relative; overflow:hidden; transition:transform .12s;
    background-repeat:no-repeat; background-position:center center; background-size:cover;}
  .day:active{transform:scale(.92);}
  .day.today{border-color:var(--coral); color:var(--coral); font-weight:600;}
  .day.filled{color:transparent;}
  .day.filled .num{opacity:0;}
  .day .num{position:relative; z-index:1;}
  .day.empty{visibility:hidden;}

  /* gallery */
  .gallery{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px 18px 24px;}
  .gitem{aspect-ratio:1/1; border-radius:50%; overflow:hidden; background:rgba(255,255,255,.5);
    box-shadow:var(--shadow); cursor:pointer; background-size:cover; background-position:center; position:relative;}
  .gitem .glabel{position:absolute; bottom:5px; left:0; right:0; text-align:center; font-size:10px;
    color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.5); font-weight:600;}
  .empty-note{padding:60px 24px; text-align:center; color:var(--muted); font-size:14px; line-height:1.6;}

  /* overview / stats */
  .ov{padding:14px 20px 24px; display:flex; flex-direction:column; gap:16px;}
  .ov-head{font-size:15px; font-weight:600; color:var(--ink);}
  .yr-card{background:rgba(255,255,255,.55); border-radius:18px; padding:15px 16px; box-shadow:var(--shadow);
    cursor:pointer;}
  .yr-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:9px;}
  .yr-top .yl{font-size:17px; font-weight:600;}
  .yr-top .yc{font-size:12px; color:var(--muted);}
  .bar-track{height:10px; border-radius:6px; background:rgba(0,0,0,.06); overflow:hidden;}
  .bar-fill{height:100%; border-radius:6px; background:linear-gradient(90deg,var(--coral),var(--butter));}
  .mini-months{display:grid; grid-template-columns:repeat(12,1fr); gap:3px; margin-top:11px;}
  .mm{display:flex; flex-direction:column; align-items:center; gap:3px;}
  .mm-bar{width:100%; height:26px; background:rgba(0,0,0,.05); border-radius:4px; position:relative; overflow:hidden;}
  .mm-fill{position:absolute; left:0; right:0; bottom:0; background:var(--sage); border-radius:4px;}
  .mm-lb{font-size:8px; color:var(--muted);}

  /* bottom nav */
  .bnav{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:460px;
    display:flex; justify-content:center; gap:8px; padding:12px 0 22px;
    background:linear-gradient(180deg, transparent, rgba(245,240,236,.9) 45%);}
  .bnav .tab{width:52px; height:40px; border-radius:14px; border:none; cursor:pointer;
    background:rgba(255,255,255,.6); font-size:17px; color:var(--muted); display:flex;
    align-items:center; justify-content:center; backdrop-filter:blur(6px);}
  .bnav .tab.active{background:var(--ink); color:#fff;}

  /* daily */
  .daily{display:flex; flex-direction:column; padding:0 18px 30px; gap:14px;}
  .daily .dtitle{font-size:18px; font-weight:600; padding:2px 4px;}
  .daily .dtitle .dow{font-size:13px; color:var(--muted); font-weight:500; margin-left:8px;}
  .canvas-wrap{position:relative; width:100%; aspect-ratio:1/1; border-radius:20px; overflow:hidden;
    background:var(--paper); box-shadow:var(--shadow);}
  .canvas-wrap canvas{position:absolute; inset:0; width:100%; height:100%; touch-action:none;}
  .tools{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .swatches{display:flex; gap:7px;}
  .sw{width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid rgba(255,255,255,.85);
    box-shadow:0 1px 4px rgba(0,0,0,.12);}
  .sw.sel{outline:2px solid var(--ink); outline-offset:2px;}
  .tool-btn{height:34px; padding:0 12px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,.65); font-size:13px; color:var(--ink); cursor:pointer;
    display:inline-flex; align-items:center; gap:5px; font-family:var(--font);}
  .tool-btn:active{background:#fff;}
  .tool-btn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .sizes{display:flex; gap:6px; align-items:center;}
  .sizes .sz{width:30px; height:30px; border-radius:10px; border:1px solid var(--line);
    background:rgba(255,255,255,.65); cursor:pointer; display:flex; align-items:center; justify-content:center;}
  .sizes .sz.sel{border-color:var(--ink); background:#fff;}
  .sizes .dot{border-radius:50%; background:var(--ink);}
  .diary-text{width:100%; min-height:150px; resize:vertical; border:none; border-radius:18px;
    padding:14px 16px; background-color:var(--paper); box-shadow:var(--shadow);
    font-family:var(--font); font-size:15px; color:var(--ink); outline:none; line-height:32px;
    background-image:repeating-linear-gradient(to bottom, transparent 0px, transparent 31px, var(--line) 31px, var(--line) 32px);
    background-attachment:local; background-position:0 14px;}
  .diary-text::placeholder{color:var(--muted);}
  .save-row{display:flex; gap:10px; align-items:center;}
  .save-btn{flex:1; height:48px; border-radius:16px; border:none; cursor:pointer; background:var(--ink);
    color:#fff; font-size:15px; font-weight:600; font-family:var(--font);}
  .save-btn:active{opacity:.85;}
  .del-btn{height:48px; padding:0 18px; border-radius:16px; border:1px solid var(--line);
    background:rgba(255,255,255,.65); color:#C15B4E; font-size:14px; cursor:pointer; font-family:var(--font);}
  .saved-hint{font-size:12px; color:var(--sage); text-align:center; height:16px; transition:opacity .3s;}
  .modebar{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  .modebar .spacer{flex:1;}
  .mode-btn{height:36px; padding:0 14px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,.65); font-size:14px; color:var(--ink); cursor:pointer; font-family:var(--font);
    display:inline-flex; align-items:center; gap:5px;}
  .mode-btn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .obj-tool{height:36px; width:40px; border-radius:12px; border:1px solid var(--line);
    background:rgba(255,255,255,.65); font-size:16px; cursor:pointer;}
  .obj-tool.danger{color:#C15B4E;}
  .pentools{display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:12px;
    background:rgba(255,255,255,.45); border-radius:16px;}
  .pentools.hide{display:none;}
  .palette{display:flex; gap:7px; flex-wrap:wrap; max-width:100%;}
  .pcolor{width:24px; height:24px; border-radius:50%; cursor:pointer; border:2px solid rgba(255,255,255,.9);
    box-shadow:0 1px 3px rgba(0,0,0,.18);}
  .pcolor.sel{outline:2px solid var(--ink); outline-offset:2px;}
  .color-custom{width:30px; height:30px; border-radius:8px; overflow:hidden; border:1px solid var(--line);
    background:none; padding:0; cursor:pointer;}
  .hint-tip{font-size:11px; color:var(--muted); padding:2px 6px 0;}

  /* settings sheet */
  .sheet-mask{position:fixed; inset:0; background:rgba(40,35,30,.35); z-index:100; display:flex;
    align-items:flex-end; justify-content:center; animation:fade .2s;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .sheet{width:100%; max-width:460px; background:#fff; border-radius:24px 24px 0 0; padding:22px 22px 34px;
    box-shadow:0 -8px 30px rgba(0,0,0,.15); animation:slideup .25s;}
  @keyframes slideup{from{transform:translateY(30px);}to{transform:translateY(0);}}
  .sheet h3{margin:0 0 4px; font-size:17px;}
  .sheet .sub{font-size:12px; color:var(--muted); margin-bottom:16px;}
  .sheet .group-lb{font-size:12px; color:var(--muted); margin:14px 0 8px; font-weight:600;}
  .bg-presets{display:flex; gap:10px; flex-wrap:wrap;}
  .bg-swatch{width:52px; height:52px; border-radius:14px; cursor:pointer; border:2px solid transparent;
    box-shadow:0 1px 5px rgba(0,0,0,.1);}
  .bg-swatch.sel{border-color:var(--ink);}
  .stk-mask{position:fixed; inset:0; z-index:90; display:flex; align-items:flex-end; justify-content:center;}
  .stk-sheet{width:100%; max-width:460px; background:#fff; border-radius:22px 22px 0 0; padding:14px 14px 28px;
    box-shadow:0 -8px 30px rgba(0,0,0,.18); animation:slideup .25s; max-height:55vh; display:flex; flex-direction:column;}
  .stk-tabs{display:flex; gap:6px; margin-bottom:10px; overflow-x:auto; flex-shrink:0;}
  .stk-tab{padding:7px 14px; border-radius:18px; font-size:13px; font-weight:600; border:none; cursor:pointer;
    background:var(--line); color:var(--muted); font-family:var(--font); white-space:nowrap;}
  .stk-tab.on{background:var(--ink); color:#fff;}
  .stk-grid{display:flex; flex-wrap:wrap; gap:8px; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:4px 0;}
  .stk-item{width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; background:rgba(245,243,238,.8); border:1.5px solid var(--line); transition:transform .1s;}
  .stk-item:active{transform:scale(.88);}
  .stk-item img{width:40px; height:40px; object-fit:contain;}
  .stk-item .emo{font-size:30px; line-height:1;}
  .q-row{display:flex; align-items:center; gap:6px; margin-top:12px;}
  .q-lb{font-size:12px; color:var(--muted); margin-right:2px;}
  .q-btn{flex:1; padding:8px 0; border-radius:12px; border:1.5px solid var(--line); background:#fff; font-family:var(--font); font-size:13px; font-weight:600; color:var(--muted); cursor:pointer;}
  .q-btn.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .slot-row{display:flex; align-items:center; gap:7px; margin:2px 0 10px;}
  .slot-pill{width:30px; height:30px; border-radius:50%; border:1.5px solid var(--line); background:#fff; font-family:var(--font); font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; padding:0; line-height:1;}
  .slot-pill.has{border-color:var(--ink); color:var(--ink);}
  .slot-pill.cur{background:var(--ink); color:#fff; border-color:var(--ink);}
  .slot-hint{font-size:11px; color:var(--muted); margin-left:4px;}
  .day{position:relative;}
  .cnt-badge{position:absolute; top:3px; right:3px; min-width:15px; height:15px; padding:0 3px; border-radius:8px; background:var(--ink); color:#fff; font-size:10px; font-weight:700; line-height:15px; text-align:center;}
  .bg-row{display:flex; gap:10px; margin-top:10px;}
  .opacity-row{margin-top:12px;}
  .opacity-row label{font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;}
  .opacity-row input[type=range]{flex:1; height:6px; accent-color:var(--ink); cursor:pointer;}
  .opacity-row .opval{font-size:13px; color:var(--ink); font-weight:600; min-width:32px; text-align:right;}
  .bg-action{flex:1; height:46px; border-radius:14px; border:1px solid var(--line); background:#FAF8F4;
    font-size:14px; cursor:pointer; font-family:var(--font); display:flex; align-items:center;
    justify-content:center; gap:6px; color:var(--ink);}
  .bg-action input[type=color]{width:26px; height:26px; border:none; background:none; cursor:pointer; padding:0;}
  .sheet-close{margin-top:20px; width:100%; height:48px; border-radius:16px; border:none; background:var(--ink);
    color:#fff; font-size:15px; font-weight:600; cursor:pointer; font-family:var(--font);}
  @media(min-width:520px){
    html,body{height:100%; overflow:hidden;}
    body{align-items:center; padding:24px 0;
      background:radial-gradient(circle at 50% 25%, #3d3d45 0%, #26262c 72%);}
    #app{width:392px; max-width:392px; min-height:0; height:min(844px, calc(100vh - 48px));
      border-radius:46px; overflow-y:auto; overflow-x:hidden; padding-bottom:0;
      box-shadow:0 30px 90px rgba(0,0,0,.42); position:relative;}
    #app::-webkit-scrollbar{width:0; background:transparent;}
    .bnav{position:sticky; left:auto; transform:none; width:100%; max-width:100%; margin-top:auto;}
    .sheet-mask{position:absolute;}
  }
  .crop-stage{position:relative; margin:14px auto 4px; border-radius:12px; overflow:hidden; touch-action:none; background:#1b1b1b;}
  .crop-stage img{display:block; width:100%; height:100%; pointer-events:none; -webkit-user-drag:none; user-select:none;}
  .crop-box{position:absolute; border:2px solid #fff; box-shadow:0 0 0 9999px rgba(0,0,0,.55); box-sizing:border-box; cursor:move;}
  .crop-h{position:absolute; width:18px; height:18px; margin:-9px 0 0 -9px; background:#fff; border-radius:50%; box-shadow:0 1px 3px rgba(0,0,0,.4); touch-action:none;}
  .sync-in{width:100%; height:42px; border:1px solid var(--line); border-radius:12px; padding:0 12px; font-size:14px;
    font-family:var(--font); margin-bottom:8px; background:#FAF8F4; color:var(--ink); outline:none;}
  .sync-status{font-size:12px; color:var(--muted); margin-top:8px; text-align:center;}
  .sync-row{display:flex; gap:8px;}
  input[type=file]{display:none;}
</style>
</head>

  var syncCfg=loadSync(), pushTimer=null;
  function setSyncStatus(t){ var e=document.getElementById('syncStatus'); if(e)e.textContent=t; }
  function authHdr(base, keyOverride, typeOverride){
    base=base||{};
    var k=keyOverride||(syncCfg&&syncCfg.key), ty=typeOverride||(syncCfg&&syncCfg.keyType)||'master';

  }
  function mergeStores(a,b){ var out={},keys={}; a=a||{}; b=b||{};

  // ---------- editor engine ----------
  var syncTools=function(){};

  function snapObjs(){ return ED.objects.map(function(o){ var d={type:o.type,src:o.src,x:o.x,y:o.y,w:o.w,h:o.h,rot:o.rot||0}; if(o.emoji)d.emoji=o.emoji; return d; }); }
  function pushHistory(){ if(!ED.history)ED.history=[]; ED.history.push(snapObjs()); if(ED.history.length>40)ED.history.shift(); }
  function doUndo(){
    if(ED.mode==='draw' && ED.hasStroke){ ED.strokeCv=null; ED.strokeCtx=null; ED.hasStroke=false; redraw(); if(syncTools)syncTools(); return; }
    if(!ED.history||!ED.history.length)return;
    var snap=ED.history.pop();
    ED.objects=snap.map(function(o){ var c={type:o.type,src:o.src,x:o.x,y:o.y,w:o.w,h:o.h,rot:o.rot||0}; if(o.emoji)c.emoji=o.emoji; loadObjImg(c); return c; });
    ED.selected=null; ED.dirty=true; redraw(); if(syncTools)syncTools();
  }

  function initEditor(canvas, entry){
    var dpr=window.devicePixelRatio||1;
    var rect=canvas.getBoundingClientRect();
    canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr);
    var ctx=canvas.getContext('2d'); ctx.scale(dpr,dpr);
    ED.canvas=canvas; ED.ctx=ctx; ED.W=rect.width; ED.H=rect.height; ED.dpr=dpr;
    ED.objects=[]; ED.selected=null; ED.mode='select'; ED.strokeCv=null; ED.strokeCtx=null;
    ED.hasStroke=false; ED.drawing=false; ED.action=null; ED.dirty=false; ED.history=[];

    if(entry.objects && entry.objects.length){
      entry.objects.forEach(function(o){
        var c={type:o.type, src:o.src, x:o.x, y:o.y, w:o.w, h:o.h, rot:o.rot||0};
        if(o.emoji) c.emoji=o.emoji;
        loadObjImg(c); ED.objects.push(c);
      });
    } else if(entry.canvas){ // legacy flat image -> single drawing object
      var c={type:'drawing', src:entry.canvas, x:0, y:0, w:ED.W, h:ED.H, rot:0};
      loadObjImg(c); ED.objects.push(c);
    }
    redraw(); ED.syncTools();

    canvas.addEventListener('pointerdown', onDown);
    canvas.addEventListener('pointermove', onMove);
    if(!ED.pointerUpBound){ window.addEventListener('pointerup', onUp); ED.pointerUpBound=true; }
  }

  function loadObjImg(o){ var im=new Image(); im.onload=function(){o._img=im; redraw();}; im.src=o.src; o._img=im; }

  function redraw(){
    var c=ED.ctx; if(!c)return; var W=ED.W,H=ED.H;
    c.clearRect(0,0,W,H); c.fillStyle='#FDFBF6'; c.fillRect(0,0,W,H);
    ED.objects.forEach(function(o){
      if(!o._img||!o._img.complete||!o._img.width) return;
      c.save(); c.translate(o.x+o.w/2,o.y+o.h/2); c.rotate(o.rot||0);
      c.drawImage(o._img,-o.w/2,-o.h/2,o.w,o.h); c.restore();
    });
    if(ED.mode==='draw' && ED.strokeCv){ c.drawImage(ED.strokeCv,0,0,W,H); }
    if(ED.selected && ED.mode==='select') drawSelection(ED.selected);
  }

  function drawSelection(o){
    var c=ED.ctx; c.save(); c.translate(o.x+o.w/2,o.y+o.h/2); c.rotate(o.rot||0);
    c.strokeStyle='rgba(51,50,46,.9)'; c.lineWidth=1.5; c.setLineDash([5,4]);
    c.strokeRect(-o.w/2,-o.h/2,o.w,o.h); c.setLineDash([]);
    var hw=o.w/2, hh=o.h/2, pts=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
    c.fillStyle='#fff'; c.strokeStyle='#33322E';
    pts.forEach(function(p){ c.beginPath(); c.arc(p[0],p[1],6,0,Math.PI*2); c.fill(); c.stroke(); });
    // rotate handle
    c.beginPath(); c.moveTo(0,-hh); c.lineTo(0,-hh-26); c.stroke();
    c.beginPath(); c.arc(0,-hh-26,7,0,Math.PI*2); c.fillStyle='#E8836F'; c.fill(); c.stroke();
    c.restore();
  }

  function pos(e){ var r=ED.canvas.getBoundingClientRect();
    var cx=e.clientX!=null?e.clientX:(e.touches?e.touches[0].clientX:0);
    var cy=e.clientY!=null?e.clientY:(e.touches?e.touches[0].clientY:0);
    return {x:cx-r.left, y:cy-r.top}; }

  function toLocal(o,p){ var cx=o.x+o.w/2, cy=o.y+o.h/2, dx=p.x-cx, dy=p.y-cy;
    var cos=Math.cos(o.rot||0), sin=Math.sin(o.rot||0);
    return {x:dx*cos+dy*sin, y:-dx*sin+dy*cos}; }
  function toScreen(o,lx,ly){ var cx=o.x+o.w/2, cy=o.y+o.h/2, cos=Math.cos(o.rot||0), sin=Math.sin(o.rot||0);
    return {x:cx+lx*cos-ly*sin, y:cy+lx*sin+ly*cos}; }

  function inObj(o,p){ var l=toLocal(o,p); return Math.abs(l.x)<=o.w/2+2 && Math.abs(l.y)<=o.h/2+2; }
  function topObjAt(p){ for(var i=ED.objects.length-1;i>=0;i--){ if(inObj(ED.objects[i],p)) return ED.objects[i]; } return null; }

  function handleAt(o,p){
    var hw=o.w/2, hh=o.h/2;
    var rot=toScreen(o,0,-hh-26); if(dist(rot,p)<=12) return 'rot';
    var corners=[['nw',-hw,-hh],['ne',hw,-hh],['se',hw,hh],['sw',-hw,hh]];
    for(var i=0;i<corners.length;i++){ var s=toScreen(o,corners[i][1],corners[i][2]); if(dist(s,p)<=12) return corners[i][0]; }
    return null;

  function dist(a,b){ var dx=a.x-b.x, dy=a.y-b.y; return Math.sqrt(dx*dx+dy*dy); }

  function onDown(e){
    e.preventDefault(); var p=pos(e); ED.snap=false;
    if(ED.mode==='draw'){ startStroke(p); return; }
    if(ED.selected){
      var h=handleAt(ED.selected,p);
      if(h==='rot'){ ED.action='rotate'; ED.start={}; return; }
      if(h){ ED.action='resize'; ED.start={w:ED.selected.w,h:ED.selected.h}; return; }
    }
    var obj=topObjAt(p);

    else ED.action=null;
    redraw(); ED.syncTools();

  function onMove(e){

    e.preventDefault(); var o=ED.selected, s=ED.start;
    if(!ED.snap){ pushHistory(); ED.snap=true; if(syncTools)syncTools(); }
    if(ED.action==='move'){ o.x=s.x+(p.x-s.p.x); o.y=s.y+(p.y-s.p.y); ED.dirty=true; }
    else if(ED.action==='resize'){
      var l=toLocal(o,p); var scale=Math.max(Math.abs(l.x)/(s.w/2), Math.abs(l.y)/(s.h/2)); scale=Math.max(scale,0.05);
      var cx=o.x+o.w/2, cy=o.y+o.h/2, nw=s.w*scale, nh=s.h*scale;

      var cx2=o.x+o.w/2, cy2=o.y+o.h/2; o.rot=Math.atan2(p.y-cy2,p.x-cx2)+Math.PI/2; ED.dirty=true;

  function ensureStroke(){
    if(ED.strokeCv) return;
    var cv=document.createElement('canvas'); cv.width=Math.round(ED.W*ED.dpr); cv.height=Math.round(ED.H*ED.dpr);
    var ctx=cv.getContext('2d'); ctx.scale(ED.dpr,ED.dpr); ctx.lineCap='round'; ctx.lineJoin='round';
    ED.strokeCv=cv; ED.strokeCtx=ctx; ED.hasStroke=false;
  }
  function startStroke(p){ ensureStroke(); ED.drawing=true; ED.last=p; drawSeg(p,p); }
  function drawTo(p){ drawSeg(ED.last,p); ED.last=p; }
  function drawSeg(a,b){
    var c=ED.strokeCtx; if(!c)return;
    c.globalCompositeOperation=ED.eraser?'destination-out':'source-over';
    c.strokeStyle=ED.eraser?'rgba(0,0,0,1)':ED.color; c.lineWidth=ED.eraser?ED.size*4:ED.size;
    c.beginPath(); c.moveTo(a.x,a.y); c.lineTo(b.x,b.y); c.stroke();
    ED.hasStroke=true; ED.dirty=true; redraw();
  }
  function commitDrawing(){
    if(!ED.strokeCv||!ED.hasStroke){ ED.strokeCv=null; ED.strokeCtx=null; ED.hasStroke=false; return; }
    var cv=ED.strokeCv, cw=cv.width, ch=cv.height, d=ED.strokeCtx.getImageData(0,0,cw,ch).data;
    var minX=cw,minY=ch,maxX=0,maxY=0,found=false;
    for(var y=0;y<ch;y++){ for(var x=0;x<cw;x++){ if(d[(y*cw+x)*4+3]>10){ found=true;
      if(x<minX)minX=x; if(x>maxX)maxX=x; if(y<minY)minY=y; if(y>maxY)maxY=y; } } }
    if(!found){ ED.strokeCv=null; ED.strokeCtx=null; ED.hasStroke=false; return; }
    var pad=Math.round(6*ED.dpr);
    minX=Math.max(0,minX-pad); minY=Math.max(0,minY-pad); maxX=Math.min(cw-1,maxX+pad); maxY=Math.min(ch-1,maxY+pad);
    var bw=maxX-minX+1, bh=maxY-minY+1;
    var out=document.createElement('canvas'); out.width=bw; out.height=bh;
    out.getContext('2d').drawImage(cv,minX,minY,bw,bh,0,0,bw,bh);
    var o={type:'drawing', src:out.toDataURL('image/png'), x:minX/ED.dpr, y:minY/ED.dpr, w:bw/ED.dpr, h:bh/ED.dpr, rot:0};
    pushHistory(); loadObjImg(o); ED.objects.push(o);
    ED.strokeCv=null; ED.strokeCtx=null; ED.hasStroke=false;
  }

  function flatten(){

    var c=cv.getContext('2d'); c.scale(ED.dpr,ED.dpr);

  function openCropper(img, done){
    var vw=Math.min(340,(window.innerWidth||360)-64);
    var scale=vw/img.width, sh=img.height*scale;
    var maxH=(window.innerHeight||640)*0.5;
    if(sh>maxH){ scale=maxH/img.height; sh=maxH; vw=img.width*scale; }
    var sw=vw;
    var mask=el('div','sheet-mask'); var sheet=el('div','sheet');
    sheet.innerHTML='<h3>사진 자르기</h3><div class="sub">넣을 영역을 드래그해서 맞춰줘.</div>';
    var stage=el('div','crop-stage'); stage.style.width=sw+'px'; stage.style.height=sh+'px';
    var im=document.createElement('img'); im.src=img.src; stage.appendChild(im);
    var box=el('div','crop-box'); var handles=[];
    ['nw','ne','se','sw'].forEach(function(h){ var e=el('div','crop-h'); e.dataset.h=h; box.appendChild(e); handles.push(e); });
    stage.appendChild(box); sheet.appendChild(stage);
    var st={x:sw*0.1,y:sh*0.1,w:sw*0.8,h:sh*0.8};
    function place(){ box.style.left=st.x+'px'; box.style.top=st.y+'px'; box.style.width=st.w+'px'; box.style.height=st.h+'px';
      var hp={nw:[0,0],ne:[st.w,0],se:[st.w,st.h],sw:[0,st.h]};
      handles.forEach(function(e){ var p=hp[e.dataset.h]; e.style.left=p[0]+'px'; e.style.top=p[1]+'px'; }); }
    place();
    var act=null,sp=null,s0=null;
    function pt(e){ var r=stage.getBoundingClientRect(); var cx=e.clientX!=null?e.clientX:e.touches[0].clientX,
      cy=e.clientY!=null?e.clientY:e.touches[0].clientY; return {x:cx-r.left,y:cy-r.top}; }
    function down(e){ e.preventDefault(); var p=pt(e); var t=e.target.dataset&&e.target.dataset.h;
      act=t?('h:'+t):'move'; sp=p; s0={x:st.x,y:st.y,w:st.w,h:st.h}; }
    function move(e){ if(!act)return; e.preventDefault(); var p=pt(e),dx=p.x-sp.x,dy=p.y-sp.y;
      if(act==='move'){ st.x=clamp(s0.x+dx,0,sw-st.w); st.y=clamp(s0.y+dy,0,sh-st.h); }
      else{ var h=act.slice(2);
        if(h==='nw'){ st.x=clamp(s0.x+dx,0,s0.x+s0.w-30); st.y=clamp(s0.y+dy,0,s0.y+s0.h-30); st.w=s0.w-(st.x-s0.x); st.h=s0.h-(st.y-s0.y); }
        else if(h==='ne'){ st.y=clamp(s0.y+dy,0,s0.y+s0.h-30); st.w=clamp(s0.w+dx,30,sw-s0.x); st.h=s0.h-(st.y-s0.y); }
        else if(h==='se'){ st.w=clamp(s0.w+dx,30,sw-s0.x); st.h=clamp(s0.h+dy,30,sh-s0.y); }
        else if(h==='sw'){ st.x=clamp(s0.x+dx,0,s0.x+s0.w-30); st.w=s0.w-(st.x-s0.x); st.h=clamp(s0.h+dy,30,sh-s0.y); }
      }
      place(); }
    function up(){ act=null; }
    stage.addEventListener('pointerdown',down); stage.addEventListener('pointermove',move);
    stage.addEventListener('pointerup',up); stage.addEventListener('pointerleave',up);

    var quality='mid';
    var qWrap=el('div','q-row');
    var qlb=el('div','q-lb'); qlb.textContent='화질'; qWrap.appendChild(qlb);
    var qBtns={};
    [['low','저화질'],['mid','중간'],['high','고화질']].forEach(function(pair){
      var b=document.createElement('button'); b.className='q-btn'+(pair[0]===quality?' on':''); b.textContent=pair[1];
      b.onclick=function(){ quality=pair[0]; Object.keys(qBtns).forEach(function(kk){qBtns[kk].classList.toggle('on',kk===quality);}); };
      qBtns[pair[0]]=b; qWrap.appendChild(b);
    });
    sheet.appendChild(qWrap);

    var row=el('div','sync-row'); row.style.marginTop='14px';
    var cancel=document.createElement('button'); cancel.className='bg-action'; cancel.textContent='취소'; cancel.style.flex='1';
    var apply=document.createElement('button'); apply.className='sheet-close'; apply.style.marginTop='0'; apply.style.flex='1'; apply.textContent='적용';
    cancel.onclick=function(){ close(); };
    apply.onclick=function(){
      var sx=st.x/scale, sy=st.y/scale, cw=st.w/scale, ch=st.h/scale;
      var QMAP={low:[560,0.42],mid:[1000,0.72],high:[1600,0.85]};

      var cv=document.createElement('canvas'); cv.width=ow; cv.height=oh;
      cv.getContext('2d').drawImage(img,sx,sy,cw,ch,0,0,ow,oh);
      var url=cv.toDataURL('image/jpeg',jq); close(); done(url);
    };
    row.appendChild(cancel); row.appendChild(apply); sheet.appendChild(row);
    function close(){ if(mask.parentNode) document.body.removeChild(mask); }
    mask.appendChild(sheet); document.body.appendChild(mask);
  }

      fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:authHdr({'Content-Type':'application/json','X-Bin-Name':'hyejin-diary'}, kk, selType),body:JSON.stringify(store)})
       .then(function(r){return r.json();}).then(function(j){ var id=j&&j.metadata&&j.metadata.id;
         if(id){ binIn.value=id; syncCfg={key:kk,bin:id,keyType:selType}; saveSyncCfg(syncCfg); status.textContent='새 Bin 생성됨 · ID가 채워졌어'; }
         else status.textContent='생성 실패 (Access Key라면 Create 권한 확인)'; }).catch(function(){ status.textContent='생성 실패(네트워크)'; }); };
    upBtn.onclick=function(){ status.textContent='올리는 중...'; doPush(function(ok){ status.textContent=ok?'올리기 완료':'올리기 실패'; }); };
    downBtn.onclick=function(){ status.textContent='받는 중...'; pullSync(function(){ status.textContent='받기 완료'; if(state.view==='year')renderYear(); }); };

    var srow3=el('div','sync-row'); srow3.style.marginTop='8px';
    var linkBtn=el('div','bg-action'); linkBtn.textContent='📋 연결 링크 복사'; linkBtn.style.flex='1';
    linkBtn.onclick=function(){
      if(!syncCfg||!syncCfg.key||!syncCfg.bin){ status.textContent='먼저 연결부터 해줘'; return; }
      var base=location.origin+location.pathname;
      var hash='#k='+encodeURIComponent(syncCfg.key)+'&b='+encodeURIComponent(syncCfg.bin)+'&t='+(syncCfg.keyType||'access');
      var url=base+hash;
      if(navigator.clipboard&&navigator.clipboard.writeText){
        navigator.clipboard.writeText(url).then(function(){ status.textContent='링크 복사됨! 다른 기기에서 열면 자동 연결돼'; });
      }else{
        prompt('이 링크를 복사해서 다른 기기에서 열어:',url); status.textContent='링크가 위에 떴어 — 복사해';
      }
    };
    srow3.appendChild(linkBtn); sheet.appendChild(srow3);

    var cl=document.createElement('button'); cl.className='sheet-close'; cl.textContent='완료'; cl.onclick=close;
    sheet.appendChild(cl);

    function close(){ document.body.removeChild(mask); }
    mask.onclick=function(e){ if(e.target===mask) close(); };
    mask.appendChild(sheet); document.body.appendChild(mask);
  }

  // ---------- util ----------
  function el(tag,cls){var e=document.createElement(tag); if(cls)e.className=cls; return e;}

  // ---------- swipe nav (모바일 좌우 스와이프로 탭 전환) ----------
  (function(){
    var MODES=['overview','calendar','gallery'];
    var sx=0, sy=0, swiping=false;
    app.addEventListener('touchstart', function(e){
      if(state.view!=='year') return;
      var t=e.touches[0]; sx=t.clientX; sy=t.clientY; swiping=true;
    }, {passive:true});
    app.addEventListener('touchend', function(e){
      if(!swiping||state.view!=='year') return; swiping=false;
      var t=e.changedTouches[0]; var dx=t.clientX-sx, dy=t.clientY-sy;
      if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx)) return; // 너무 짧거나 세로 스크롤
      var ci=MODES.indexOf(state.mode); if(ci<0) ci=1;
      if(dx<0 && ci<MODES.length-1){ state.mode=MODES[ci+1]; renderYear(); } // 왼쪽 스와이프 = 다음
      else if(dx>0 && ci>0){ state.mode=MODES[ci-1]; renderYear(); } // 오른쪽 스와이프 = 이전
    }, {passive:true});
  })();

  // ---------- go ----------
  // URL 해시로 동기화 연결: #k=KEY&b=BIN&t=access|master
  (function parseHash(){
    var h=location.hash.slice(1); if(!h) return;
    var p={}; h.split('&').forEach(function(kv){ var s=kv.split('='); if(s.length===2) p[s[0]]=decodeURIComponent(s[1]); });
    if(p.k&&p.b){
      syncCfg={key:p.k, bin:p.b, keyType:p.t||'access'};
      saveSyncCfg(syncCfg);
      history.replaceState(null,'',location.pathname+location.search); // 해시 제거 (주소창에 키 안 남게)
    }
  })();
  applyBg();
  renderYear();
  if(syncCfg&&syncCfg.key&&syncCfg.bin){ pullSync(function(){ if(state.view==='year') renderYear(); }); }
})();
</script>
</body>
</html>
